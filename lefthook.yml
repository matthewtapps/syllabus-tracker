# Lefthook configuration. Runs on every git commit after each dev has run
# `just install-hooks` once.
#
# Each command's `glob` filters which staged files trigger it. If nothing
# matching is staged, the command is skipped entirely.
#
# Bypass everything with `git commit --no-verify`.

# Widen the output so terminal viewers (including lazygit, which only shows
# whatever lefthook prints) can see progress and command stdout/stderr rather
# than just a final pass/fail.
output:
  - summary
  - failure
  - execution
  - execution_out
  - skips

pre-commit:
  parallel: true
  commands:
    backend-lint:
      glob: "*.rs"
      run: just lint-backend
    backend-test:
      glob: "*.rs"
      run: just test-backend
    frontend-lint:
      glob: "frontend/**/*.{ts,tsx,js,jsx,cjs,mjs}"
      run: just lint-frontend
