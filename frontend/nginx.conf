server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite output: filename changes on every content change, so the
    # browser can keep the old bytes forever. `immutable` skips revalidation
    # entirely while the cache entry is fresh.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Service worker and its workbox runtime must always be revalidated,
    # otherwise users get stuck on whatever build first installed the SW on
    # their device. `no-cache` lets browsers keep a copy and 304 it.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache" always;
    }
    location ~ ^/workbox-[^/]+\.js$ {
        add_header Cache-Control "no-cache" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
    }

    # index.html references the current build's hashed assets by name, so it
    # must be revalidated on every load. `no-cache` (not `no-store`) still
    # lets the browser keep a copy and use a cheap 304 when unchanged.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # SPA fallback: any unmatched route serves index.html (and inherits its
    # no-cache header via the location above, since try_files re-enters).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
