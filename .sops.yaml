# SOPS recipients for the production runtime secrets file.
#
# sugar_glider_host: age recipient derived from sugar-glider's SSH host
# key via ssh-to-age. The host decrypts runtime-secrets.enc.env at
# activation via sops-nix on the platform host.

keys:
  - &laptop_primary    age1dkmrzjz5zye09w3vdt74kk4q43erjqhau8ce5f0shd9uzuhjwpfqs2ntkm
  - &laptop_backup     age1nhxka2zhzu4ynjxfq9cqqs3yv4f4k0sts5cc3tvknmzkq3x49dnshglgxv
  - &sugar_glider_host age1g0t733wx429tvvx834mtsz3pfx3887acppyps25feujlfzl92cqs92wm5p

creation_rules:
  - path_regex: runtime-secrets\.enc\.env$
    key_groups:
      - age:
          - *laptop_primary
          - *laptop_backup
          - *sugar_glider_host
