name: Deploy

# Deploys to sugar-glider. Pulls all provider credentials and the SSH
# key fresh from platform tofu state on every run (Path 3 cross-repo
# model). The only GHA-resident secrets are the two PLATFORM_STATE_R2_*
# values needed to read platform state.
#
# Triggers:
#   - push to main           -> full pipeline (lint/test/sqlx-check + deploy)
#   - pull_request           -> lint/test/sqlx-check only; no deploy jobs run
#   - manual workflow_dispatch -> full pipeline
#
# The deploy-only jobs (read_platform, apply_tofu, build_*, prep_host,
# restore_litestream, migrate, deploy, verify) are gated with
# `if: github.event_name != 'pull_request'` so a PR run exercises code
# correctness gates without touching prod infrastructure. The staging
# sibling deploys are owned by .github/workflows/staging.yml; they are
# triggered manually only.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      allow_destructive_migrations:
        description: "Allow destructive schema migrations (data loss possible)"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: matthewtapps/syllabus-tracker

# Default GITHUB_TOKEN in env-scoped jobs has restricted scopes; need
# to grant packages:write explicitly so docker push to GHCR works.
# contents:read is the default but we set it explicitly for clarity.
permissions:
  contents: read
  packages: write

# Per-ref concurrency: main pushes share one group (so new commits
# cancel in-flight deploys), each PR branch gets its own (so pushing
# new commits cancels just that PR's run).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Read platform state, expose VM_IP + host_age_ready flag.
  # host_age_ready=false means sugar-glider hasn't been bootstrapped via
  # nixos-anywhere yet, so the deploy job no-ops.
  read_platform:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      vm_ip:               ${{ steps.read.outputs.vm_ip }}
      host_age_ready:      ${{ steps.read.outputs.host_age_ready }}
      host_age_recipient:  ${{ steps.read.outputs.host_age_recipient }}
      # Note: VITE_HONEYCOMB_API_KEY is NOT exposed as a job output.
      # GitHub Actions refuses to propagate ::add-mask::'d values
      # across jobs ("Skip output ... since it may contain secret").
      # build_frontend pulls it directly from platform tofu state.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install opentofu via nix
        # nix cache is independent of github releases CDN
        run: |
          nix profile install nixpkgs#opentofu
          tofu version
      - name: Read platform state
        id: read
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
        run: |
          cd infra
          i=0; until tofu init -input=false; do i=$((i+1)); [ $i -ge 30 ] && { echo "::error::tofu init failed after 30 attempts"; exit 1; }; echo "tofu init attempt $i failed; sleeping 30s"; sleep 30; done
          # Refresh-only persists data source values + outputs to state
          # without creating any resources. Then `tofu output -raw` is
          # reliable (avoids `tofu console`'s EOF-handling quirks).
          tofu apply -refresh-only -auto-approve -input=false -lock=false
          VM_IP=$(tofu output -raw _platform_vm_ip)
          HOST_AGE=$(tofu output -raw _platform_host_age_recipient)
          echo "vm_ip=$VM_IP" >> "$GITHUB_OUTPUT"
          echo "host_age_recipient=$HOST_AGE" >> "$GITHUB_OUTPUT"
          if [ -n "$HOST_AGE" ]; then
            echo "host_age_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "host_age_ready=false" >> "$GITHUB_OUTPUT"
          fi
          echo "VM_IP=$VM_IP, host_age_ready=$([ -n \"$HOST_AGE\" ] && echo true || echo false)"

  # Backend correctness gate: clippy + nextest. Runs unconditionally on every
  # push and PR; gates build_backend and build_frontend so a broken-build SHA
  # never gets pushed to GHCR. Runs through the project's Nix dev shell
  # (`nix develop .#ci`) so the toolchain (rustc, cargo-nextest, just) is
  # byte-identical to local dev.
  #
  # NOTE: we deliberately do NOT run `sqlx prepare --check` here. SQLite's
  # type inference for expression columns (MAX/COUNT/SUM/COALESCE/CASE over an
  # empty table) is not reproducible across the SQLite that different hosts
  # compile into sqlx's proc-macro, so `--check` false-fails on a cache that is
  # otherwise correct (see launchbadge/sqlx#1737). The offline build is the
  # real gate instead: `test` compiles with `SQLX_OFFLINE=true`, so a missing
  # or query-text-changed cache entry fails to compile, and the tests run real
  # queries against a live migrated DB, catching schema/cache type drift at
  # runtime. Regenerate the cache locally with `just sqlx-prepare` when you
  # change a query.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      # Caches the Nix store (the .#ci toolchain closure) plus cargo build
      # artifacts. Key tracks flake.lock (toolchain) + Cargo.lock (deps); a
      # prefix restore gives a warm partial cache when only code changed.
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-checks-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-checks-
          # Raised from 5G: the backend + video-worker Docker layer caches now
          # use a registry backend, so they no longer compete with this
          # nix/cargo cache for the shared 10 GB GHA cache pool. More headroom
          # here means fewer cargo recompiles in clippy/nextest.
          gc-max-store-size-linux: 8G
          paths: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
      # cache-nix-action restores under a root context, so ~/.cargo and the
      # cached target/ come back root-owned. cargo then cannot create the
      # git-dependency checkout dir (e.g. rocket) and clippy fails with
      # "Permission denied (os error 13)". Reclaim ownership for the runner
      # user (passwordless sudo on GitHub-hosted runners). The nix store
      # (legitimately root-owned and read-only) is left untouched.
      - name: Reclaim ownership of the restored cargo cache
        run: |
          sudo chown -R "$(id -u):$(id -g)" ~/.cargo target 2>/dev/null || true
          mkdir -p ~/.cargo/git/checkouts
      - name: Clippy (backend lint)
        run: nix develop .#ci --command just lint-backend
      - name: Backend tests (nextest)
        run: nix develop .#ci --command just test-backend

  # Frontend component tests via Vitest Browser Mode (Playwright /
  # Chromium). Runs on every push and PR. Kept separate from the build
  # job so a test failure fails fast without spinning up docker buildx.
  frontend_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend
      - name: Run vitest
        run: pnpm test
        working-directory: frontend

  apply_tofu:
    needs: read_platform
    if: github.event_name != 'pull_request' && needs.read_platform.outputs.host_age_ready == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install opentofu via nix
        # nix cache is independent of github releases CDN
        run: |
          nix profile install nixpkgs#opentofu
          tofu version
      - name: tofu apply
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
        run: |
          cd infra
          i=0; until tofu init -input=false; do i=$((i+1)); [ $i -ge 30 ] && { echo "::error::tofu init failed after 30 attempts"; exit 1; }; echo "tofu init attempt $i failed; sleeping 30s"; sleep 30; done
          tofu apply -auto-approve -input=false

  # Runs on every event. On push / workflow_dispatch the build is
  # pushed to GHCR for the deploy chain; on pull_request the build
  # runs as a deployability check with push: false and no GHCR login.
  build_backend:
    needs: [checks, frontend_test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        # Log in on PRs too (read-only via GITHUB_TOKEN) so the registry-backed
        # layer cache can be pulled on PR builds. Image push stays gated on
        # push:/cache-to below.
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:latest
          # Registry-backed layer cache: no 10 GB GHA cache-pool cap, no LRU
          # eviction. Shared ref with staging so both envs reuse one warm
          # cargo-chef dependency layer. cache-to only on push (PRs can't write).
          cache-from: type=registry,ref=ghcr.io/matthewtapps/syllabus-tracker/buildcache:backend
          cache-to: ${{ github.event_name != 'pull_request' && 'type=registry,ref=ghcr.io/matthewtapps/syllabus-tracker/buildcache:backend,mode=max' || '' }}

  # Same pattern as build_backend, plus the platform-state read for the
  # browser-side Honeycomb key (push/dispatch only). On PR runs the
  # honeycomb key is left blank: the build is a deployability check, not
  # a deployable artifact.
  build_frontend:
    needs: [checks, frontend_test]
    runs-on: ubuntu-latest
    environment: production   # needs PLATFORM_STATE_R2_* secrets for tofu state read on push events
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        if: github.event_name != 'pull_request'
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install opentofu via nix
        if: github.event_name != 'pull_request'
        # nix cache is independent of github releases CDN
        run: |
          nix profile install nixpkgs#opentofu
          tofu version
      - name: Pull VITE_HONEYCOMB_API_KEY from platform state
        # Pulled here (not as a read_platform job output) because GHA
        # refuses to propagate ::add-mask::'d values across job
        # boundaries ("Skip output ... since it may contain secret").
        # Reading directly inside the build job sidesteps that.
        if: github.event_name != 'pull_request'
        id: hc
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
        run: |
          cd infra
          i=0; until tofu init -input=false; do i=$((i+1)); [ $i -ge 30 ] && { echo "::error::tofu init failed after 30 attempts"; exit 1; }; echo "tofu init attempt $i failed; sleeping 30s"; sleep 30; done
          tofu apply -refresh-only -auto-approve -input=false -lock=false
          VITE_HC=$(tofu output -raw _platform_honeycomb_browser_ingest)
          echo "::add-mask::$VITE_HC"
          # Step output stays within the job; doesn't cross boundary.
          echo "vite_key=$VITE_HC" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          build-args: |
            VITE_API_URL=/api
            VITE_ENVIRONMENT=${{ github.event_name == 'pull_request' && 'pr-check' || 'production' }}
            VITE_HONEYCOMB_API_KEY=${{ steps.hc.outputs.vite_key }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # Stage everything the host needs for restore + migrate + deploy:
  # encrypted runtime-secrets (static + per-deploy Honeycomb),
  # Traefik dynamic config, compose + config + nginx files, docker
  # login for ghcr.io. After this job: /run/runtime-secrets/sillybus.env
  # + /run/runtime-secrets/sillybus-honeycomb.env are decrypted on
  # the host, /srv/sillybus/ has the latest compose + config, and
  # ghcr.io creds are cached. The downstream jobs (restore, migrate,
  # deploy) operate against this prepared state.
  prep_host:
    needs: [read_platform, apply_tofu]
    runs-on: ubuntu-latest
    environment: production
    env:
      VM_IP: ${{ needs.read_platform.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install opentofu + sops via nix
        run: |
          nix profile install nixpkgs#opentofu nixpkgs#sops
          tofu version
          sops --version

      - name: Pull SSH key from platform state
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
        run: |
          cd infra
          i=0; until tofu init -input=false; do i=$((i+1)); [ $i -ge 30 ] && { echo "::error::tofu init failed after 30 attempts"; exit 1; }; echo "tofu init attempt $i failed; sleeping 30s"; sleep 30; done
          tofu apply -refresh-only -auto-approve -input=false -lock=false
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          tofu output -raw _platform_ci_deploy_private_key > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_IP" >> ~/.ssh/known_hosts

      - name: Free disk on host (prune old docker images)
        # The host accumulates one image per deploy; without pruning it
        # eventually fills the disk and blocks the next deploy (the secrets
        # rsync below fails with "No space left on device"). Runs BEFORE
        # shipping so a near-full disk self-heals. Each deploy tags a unique
        # image that is immediately superseded, so we keep NO time window:
        # prune every image not used by a running container. Rollback, if ever
        # needed, re-pulls from ghcr. Volumes are never touched.
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            echo "disk before:"; df -h / | tail -1
            docker image prune -af || true
            docker builder prune -f || true
            docker container prune -f || true
            echo "disk after:"; df -h / | tail -1
          '

      - name: Build sillybus-honeycomb.enc.env from platform state
        # Honeycomb ingest keys live in platform tofu state (minted by
        # IaC, rotated via `tofu apply -replace`). Pulling them per-deploy
        # means rotation = one tofu apply + one redeploy, no commit. The
        # static runtime-secrets.enc.env in this repo holds only
        # the keys that don't change per-deploy (ROCKET_SECRET_KEY, S3_*).
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
          HOST_AGE_RECIPIENT:    ${{ needs.read_platform.outputs.host_age_recipient }}
        run: |
          cd infra
          BACKEND=$(tofu output -raw _platform_honeycomb_backend_ingest)
          BROWSER=$(tofu output -raw _platform_honeycomb_browser_ingest)
          echo "::add-mask::$BACKEND"
          echo "::add-mask::$BROWSER"
          install -m 0600 /dev/stdin /tmp/_sb_hc.env <<EOF
          HONEYCOMB_API_KEY=$BACKEND
          VITE_HONEYCOMB_API_KEY=$BROWSER
          EOF
          sops --config /dev/null -e --age "$HOST_AGE_RECIPIENT" \
            --input-type=dotenv --output-type=dotenv /tmp/_sb_hc.env > /tmp/sillybus-honeycomb.enc.env
          shred -u /tmp/_sb_hc.env

      - name: Ship runtime secrets (static + Honeycomb)
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" \
            runtime-secrets.enc.env \
            "deploy@$VM_IP:/tmp/sillybus.enc.env"
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" \
            /tmp/sillybus-honeycomb.enc.env \
            "deploy@$VM_IP:/tmp/sillybus-honeycomb.enc.env"
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            sudo install -o root -g root -m 0640 /tmp/sillybus.enc.env /etc/secrets.d/sillybus.enc.env
            sudo install -o root -g root -m 0640 /tmp/sillybus-honeycomb.enc.env /etc/secrets.d/sillybus-honeycomb.enc.env
            sudo systemctl restart runtime-secrets-decrypt.service
          '
          shred -u /tmp/sillybus-honeycomb.enc.env

      - name: Ship Traefik dynamic config
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" \
            traefik-dynamic/sillybus.yml \
            "deploy@$VM_IP:/tmp/sillybus.yml"
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            sudo install -o root -g root -m 0644 /tmp/sillybus.yml /srv/platform/traefik-dynamic/sillybus.yml
          '

      - name: Ship compose stack + config
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            sudo install -d -o deploy -g users -m 0755 /srv/sillybus &&
            sudo install -d -o deploy -g users -m 0755 /srv/sillybus/config &&
            sudo install -d -o deploy -g users -m 0755 /srv/sillybus/nginx
          '
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            docker-compose.nixos.yml \
            "deploy@$VM_IP:/srv/sillybus/docker-compose.nixos.yml"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            config/ \
            "deploy@$VM_IP:/srv/sillybus/config/"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            nginx/ \
            "deploy@$VM_IP:/srv/sillybus/nginx/"

      # docker login is intentionally NOT done here: GITHUB_TOKEN is
      # per-job and gets revoked when prep_host ends, so a login here
      # would leave stale creds for downstream jobs. migrate + deploy
      # each do their own docker login with their job's own token.

  # Restore /app/data/sqlite.db in the sillybus_app-data named volume
  # from $LITESTREAM_BUCKET if missing. This is the first thing that
  # touches the volume on a fresh deploy -- migrate + app start after
  # this exits successfully. If the bucket has no replica yet (truly
  # fresh deployment), creates an empty file so migrate can write the
  # schema. Operates via `docker run`, not compose, so it runs against
  # the named volume before the runtime stack comes up.
  #
  # Fails the job (and the workflow) if litestream restore errors for
  # any reason other than "no replica" -- worth halting the deploy on
  # rather than risking a downstream clobber.
  restore_litestream:
    needs: [read_platform, prep_host]
    runs-on: ubuntu-latest
    environment: production
    env:
      VM_IP: ${{ needs.read_platform.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install opentofu via nix
        run: |
          nix profile install nixpkgs#opentofu
          tofu version

      - name: Pull SSH key from platform state
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
        run: |
          cd infra
          i=0; until tofu init -input=false; do i=$((i+1)); [ $i -ge 30 ] && { echo "::error::tofu init failed after 30 attempts"; exit 1; }; echo "tofu init attempt $i failed; sleeping 30s"; sleep 30; done
          tofu apply -refresh-only -auto-approve -input=false -lock=false
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          tofu output -raw _platform_ci_deploy_private_key > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_IP" >> ~/.ssh/known_hosts

      - name: Restore litestream from R2 (or noop if local DB present)
        run: |
          # --entrypoint /bin/sh overrides the litestream image's default
          # `litestream` entrypoint so we can wrap the call in shell
          # logic (check for existing file, fall through on no-replica).
          # config/prod.env supplies LITESTREAM_BUCKET + LITESTREAM_ENDPOINT
          # (the compose stack picks it up automatically; standalone docker
          # run needs it explicitly).
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            set -e
            docker run --rm \
              -v sillybus_app-data:/data:rw \
              -v /srv/sillybus/config/litestream.yml:/etc/litestream.yml:ro \
              --env-file /srv/sillybus/config/prod.env \
              --env-file /run/runtime-secrets/sillybus.env \
              --entrypoint /bin/sh \
              litestream/litestream:0.3.13 \
              -c "
                set -e
                if [ -f /data/sqlite.db ]; then
                  echo \"[restore] /data/sqlite.db already present in volume; skipping\"
                  exit 0
                fi
                if [ -z \"\$LITESTREAM_BUCKET\" ]; then
                  echo \"[restore] FATAL: LITESTREAM_BUCKET is empty; refusing to silently create an empty DB\" >&2
                  exit 1
                fi
                echo \"[restore] no local DB; restoring from \$LITESTREAM_BUCKET\"
                if litestream restore -config /etc/litestream.yml /data/sqlite.db; then
                  echo \"[restore] restored from R2 (\$(du -h /data/sqlite.db | cut -f1))\"
                else
                  echo \"[restore] no replica in bucket; creating empty DB so migrate can init schema\"
                  : > /data/sqlite.db
                  chmod 0660 /data/sqlite.db
                fi
              "
          '

  # Run DB schema migrations against the restored (or empty) sqlite.db.
  # Idempotent: applies any new schema deltas atop existing data; creates
  # the schema from scratch on a fresh DB.
  #
  # ALLOW_DESTRUCTIVE_MIGRATIONS defaults to "false" so destructive
  # changes (DROP, ALTER) require an explicit workflow_dispatch input.
  # Failing here halts the workflow before deploy -- the existing
  # running stack on the host is unaffected (this job mutates the
  # volume in place but the live app keeps using its own connections;
  # deploy is what rotates containers).
  migrate:
    needs: [read_platform, restore_litestream, build_backend]
    runs-on: ubuntu-latest
    environment: production
    env:
      VM_IP: ${{ needs.read_platform.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install opentofu via nix
        run: |
          nix profile install nixpkgs#opentofu
          tofu version

      - name: Pull SSH key from platform state
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
        run: |
          cd infra
          i=0; until tofu init -input=false; do i=$((i+1)); [ $i -ge 30 ] && { echo "::error::tofu init failed after 30 attempts"; exit 1; }; echo "tofu init attempt $i failed; sleeping 30s"; sleep 30; done
          tofu apply -refresh-only -auto-approve -input=false -lock=false
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          tofu output -raw _platform_ci_deploy_private_key > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_IP" >> ~/.ssh/known_hosts

      - name: docker login (this job's GITHUB_TOKEN)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:  ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin" <<< "$GHCR_TOKEN"

      - name: Run DB migrations
        env:
          ALLOW_DESTRUCTIVE_MIGRATIONS: ${{ github.event.inputs.allow_destructive_migrations || 'false' }}
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }}"
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" "
            set -e
            docker pull '$IMG'
            docker run --rm \
              -e ALLOW_DESTRUCTIVE_MIGRATIONS='$ALLOW_DESTRUCTIVE_MIGRATIONS' \
              --env-file /run/runtime-secrets/sillybus.env \
              --env-file /srv/sillybus/config/common.env \
              --env-file /srv/sillybus/config/prod.env \
              -v sillybus_app-data:/app/data \
              --entrypoint /app/migrate \
              '$IMG'
          "

  # Bring up the runtime stack. docker-compose.nixos.yml contains only
  # the long-running services (app, frontend, nginx, litestream
  # replicate, otel-collector). Restore + migrate are already done.
  deploy:
    needs: [read_platform, migrate, build_frontend]
    runs-on: ubuntu-latest
    environment: production
    env:
      VM_IP: ${{ needs.read_platform.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install opentofu via nix
        run: |
          nix profile install nixpkgs#opentofu
          tofu version

      - name: Pull SSH key from platform state
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
          AWS_MAX_ATTEMPTS:      "5"
        run: |
          cd infra
          i=0; until tofu init -input=false; do i=$((i+1)); [ $i -ge 30 ] && { echo "::error::tofu init failed after 30 attempts"; exit 1; }; echo "tofu init attempt $i failed; sleeping 30s"; sleep 30; done
          tofu apply -refresh-only -auto-approve -input=false -lock=false
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          tofu output -raw _platform_ci_deploy_private_key > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_IP" >> ~/.ssh/known_hosts

      - name: docker login (this job's GITHUB_TOKEN)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:  ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin" <<< "$GHCR_TOKEN"

      - name: docker compose up
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" "
            cd /srv/sillybus &&
            REGISTRY='${{ env.REGISTRY }}' \
            IMAGE_NAME='${{ env.IMAGE_NAME }}' \
            APP_IMAGE_TAG='${{ github.sha }}' \
            FRONTEND_IMAGE_TAG='${{ github.sha }}' \
            docker compose -f docker-compose.nixos.yml pull &&
            REGISTRY='${{ env.REGISTRY }}' \
            IMAGE_NAME='${{ env.IMAGE_NAME }}' \
            APP_IMAGE_TAG='${{ github.sha }}' \
            FRONTEND_IMAGE_TAG='${{ github.sha }}' \
            docker compose -f docker-compose.nixos.yml up -d --remove-orphans
          "

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -fsSL https://sillybus.app/api/health; then
              exit 0
            fi
            sleep 10
          done
          echo "health check timed out"
          exit 1
