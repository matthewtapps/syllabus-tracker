name: Deploy to sillybus environment

# Deploys the sillybus instance to sugar-glider. Pulls all provider
# credentials and the SSH key fresh from platform tofu state on every
# run (Path 3 cross-repo model). The only GHA-resident secrets are the
# two PLATFORM_STATE_R2_* values needed to read platform state.
#
# Triggers:
#   - push to feat/sillybus-app
#   - manual workflow_dispatch

on:
  push:
    branches: [feat/sillybus-app]
  workflow_dispatch:
    inputs:
      allow_destructive_migrations:
        description: "Allow destructive schema migrations (data loss possible)"
        required: false
        default: "false"
    inputs:
      allow_destructive_migrations:
        description: "Allow destructive schema migrations (data loss possible)"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: matthewtapps/syllabus-tracker

# Default GITHUB_TOKEN in env-scoped jobs has restricted scopes; need
# to grant packages:write explicitly so docker push to GHCR works.
# contents:read is the default but we set it explicitly for clarity.
permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-sillybus
  cancel-in-progress: true

jobs:
  # Read platform state, expose VM_IP + host_age_ready flag.
  # host_age_ready=false means sugar-glider hasn't been bootstrapped via
  # nixos-anywhere yet, so the deploy job no-ops.
  read_platform:
    runs-on: ubuntu-latest
    environment: sillybus
    outputs:
      vm_ip:          ${{ steps.read.outputs.vm_ip }}
      host_age_ready: ${{ steps.read.outputs.host_age_ready }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.x
      - name: Read platform state
        id: read
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
        run: |
          cd infra-sillybus
          tofu init -input=false
          # Refresh-only persists data source values + outputs to state
          # without creating any resources. Then `tofu output -raw` is
          # reliable (avoids `tofu console`'s EOF-handling quirks).
          tofu apply -refresh-only -auto-approve -input=false
          VM_IP=$(tofu output -raw _platform_vm_ip)
          HOST_AGE=$(tofu output -raw _platform_host_age_recipient)
          echo "vm_ip=$VM_IP" >> "$GITHUB_OUTPUT"
          if [ -n "$HOST_AGE" ]; then
            echo "host_age_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "host_age_ready=false" >> "$GITHUB_OUTPUT"
          fi
          echo "VM_IP=$VM_IP, host_age_ready=$([ -n \"$HOST_AGE\" ] && echo true || echo false)"

  # Lint + test run unconditionally on every push. They don't need the
  # platform state (no host or DNS interaction); they gate build_backend
  # and build_frontend so a broken-build SHA never gets pushed to GHCR.
  # Mirrors the legacy main `lint` + `test` jobs in deploy.yaml verbatim
  # minus the buildevents wrappers (re-added when Honeycomb tracing is
  # wired in via infra/docs/honeycomb-telemetry.md).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.86
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          SQLX_OFFLINE: "true"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.86
      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@50b4a718b59c718df4ef27a3b445f86cd57b9f00 # v2.80.0
        with:
          tool: cargo-nextest
      - name: Run cargo nextest
        run: cargo nextest run --all-features
        env:
          SQLX_OFFLINE: "true"

  apply_tofu:
    needs: read_platform
    if: needs.read_platform.outputs.host_age_ready == 'true'
    runs-on: ubuntu-latest
    environment: sillybus
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.x
      - name: tofu apply
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
        run: |
          cd infra-sillybus
          tofu init -input=false
          tofu apply -auto-approve -input=false

  build_backend:
    needs: [read_platform, lint, test]
    if: needs.read_platform.outputs.host_age_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:sillybus-latest
          cache-from: type=gha,scope=sillybus-backend
          cache-to: type=gha,scope=sillybus-backend,mode=max

  build_frontend:
    needs: [read_platform, lint, test]
    if: needs.read_platform.outputs.host_age_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:sillybus-latest
          build-args: |
            VITE_API_URL=/api
            VITE_ENVIRONMENT=production
          cache-from: type=gha,scope=sillybus-frontend
          cache-to: type=gha,scope=sillybus-frontend,mode=max

  deploy:
    needs: [read_platform, apply_tofu, build_backend, build_frontend]
    runs-on: ubuntu-latest
    environment: sillybus
    env:
      VM_IP: ${{ needs.read_platform.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.x

      - name: Pull SSH key from platform state
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.PLATFORM_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PLATFORM_STATE_R2_SECRET_ACCESS_KEY }}
        run: |
          cd infra-sillybus
          tofu init -input=false
          tofu apply -refresh-only -auto-approve -input=false
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          tofu output -raw _platform_ci_deploy_private_key > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_IP" >> ~/.ssh/known_hosts

      - name: Ship runtime secrets
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" \
            runtime-secrets-sillybus.enc.env \
            "deploy@$VM_IP:/tmp/sillybus.enc.env"
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            sudo install -o root -g root -m 0640 /tmp/sillybus.enc.env /etc/secrets.d/sillybus.enc.env
            sudo systemctl restart runtime-secrets-decrypt.service
          '

      - name: Ship Traefik dynamic config
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" \
            traefik-dynamic/sillybus.yml \
            "deploy@$VM_IP:/tmp/sillybus.yml"
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            sudo install -o root -g root -m 0644 /tmp/sillybus.yml /srv/platform/traefik-dynamic/sillybus.yml
          '

      - name: Ship compose stack + config
        run: |
          # Use the sudoers-allowed install rule to create the service
          # dir tree. Owned by `deploy` so subsequent rsync (running as
          # deploy without sudo) writes through.
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" '
            sudo install -d -o deploy -g users -m 0755 /srv/sillybus &&
            sudo install -d -o deploy -g users -m 0755 /srv/sillybus/config &&
            sudo install -d -o deploy -g users -m 0755 /srv/sillybus/nginx
          '
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            docker-compose.nixos.yml \
            "deploy@$VM_IP:/srv/sillybus/docker-compose.nixos.yml"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            config/ \
            "deploy@$VM_IP:/srv/sillybus/config/"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            nginx/ \
            "deploy@$VM_IP:/srv/sillybus/nginx/"

      - name: docker login (so migrate + compose can pull)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:  ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin" <<< "$GHCR_TOKEN"

      - name: Run database migrations
        env:
          # Defaults to "false" on push triggers (the input default only
          # applies to workflow_dispatch). The migrate binary refuses
          # destructive changes unless this is "true", matching legacy.
          ALLOW_DESTRUCTIVE_MIGRATIONS: ${{ github.event.inputs.allow_destructive_migrations || 'false' }}
        run: |
          # /app/migrate has create_if_missing(true); /app/syllabus-tracker
          # does not. On a fresh sillybus volume the file doesn't exist,
          # so we must run migrate first or the app panics on boot.
          # Same image as the app, just a different entrypoint.
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app:${{ github.sha }}"
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" "
            docker pull \"$IMG\" &&
            docker run --rm \
              -e ALLOW_DESTRUCTIVE_MIGRATIONS='$ALLOW_DESTRUCTIVE_MIGRATIONS' \
              --env-file /run/runtime-secrets/sillybus.env \
              --env-file /srv/sillybus/config/common.env \
              --env-file /srv/sillybus/config/prod.env \
              -v sillybus_app-data:/app/data \
              --entrypoint /app/migrate \
              \"$IMG\"
          "

      - name: docker compose up
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@$VM_IP" "
            cd /srv/sillybus &&
            REGISTRY='${{ env.REGISTRY }}' \
            IMAGE_NAME='${{ env.IMAGE_NAME }}' \
            APP_IMAGE_TAG='${{ github.sha }}' \
            FRONTEND_IMAGE_TAG='${{ github.sha }}' \
            docker compose -f docker-compose.nixos.yml pull &&
            REGISTRY='${{ env.REGISTRY }}' \
            IMAGE_NAME='${{ env.IMAGE_NAME }}' \
            APP_IMAGE_TAG='${{ github.sha }}' \
            FRONTEND_IMAGE_TAG='${{ github.sha }}' \
            docker compose -f docker-compose.nixos.yml up -d --remove-orphans
          "

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -fsSL https://sillybus.app/api/health; then
              exit 0
            fi
            sleep 10
          done
          echo "health check timed out"
          exit 1
