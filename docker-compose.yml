name: syllabus-tracker-local

# Mirrors the production topology from docker-compose.nixos.yml: nginx fronts
# the app + frontend, both built from the `production` Dockerfile targets.
# `just dev` only brings up `minio`, `minio-init`, and `otel-collector` from
# this file and runs the backend + frontend natively on the host.

services:
  nginx:
    image: nginx:1.29.8-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    networks:
      - syllabus-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - config/common.env
      - config/prod.env
      - .secrets.env
    environment:
      # prod.env points S3 at Cloudflare R2 and uses prod creds; override for
      # the local MinIO container. S3_PUBLIC_ENDPOINT is what the browser hits
      # when it follows a presigned URL, so it must be the host port.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: syllabus-tracker-videos-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      # Share the host's sqlite.db so `just up` and `just dev` operate on the
      # same data. Matches the prod path (/app/data/sqlite.db from prod.env).
      # If SQLite ever switches to WAL mode, this will need to mount the
      # parent dir instead so the -wal/-shm sidecars stay co-located.
      - ./sqlite.db:/app/data/sqlite.db
    depends_on:
      - otel-collector
      - minio-init
    networks:
      - syllabus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api
        VITE_ENVIRONMENT: development
    networks:
      - syllabus-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.dev.yaml:/etc/otel-collector-config.yaml
    env_file:
      - config/common.env
      - config/dev.env
      - .secrets.env
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - syllabus-net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - syllabus-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/syllabus-tracker-videos-dev
      "
    networks:
      - syllabus-net

networks:
  syllabus-net:

volumes:
  minio-data:
