name: syllabus-tracker-local

# Mirrors the production topology from docker-compose.nixos.yml: nginx fronts
# the app + frontend, both built from the `production` Dockerfile targets.
# `just dev` only brings up `minio`, `minio-init`, and `otel-collector` from
# this file and runs the backend + frontend natively on the host.

services:
  nginx:
    image: nginx:1.31-alpine-otel
    # See docker-compose.nixos.yml: -g injects load_module into main context.
    command:
      [
        "nginx",
        "-g",
        "load_module modules/ngx_otel_module.so; daemon off;",
      ]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    networks:
      - syllabus-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - config/common.env
      - config/prod.env
      - .secrets.env
    environment:
      # prod.env points S3 at Cloudflare R2 and uses prod creds; override for
      # the local MinIO container. S3_PUBLIC_ENDPOINT is what the browser hits
      # when it follows a presigned URL, so it must be the host port.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: syllabus-tracker-videos-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      # Share the host's data dir so `just up` and `just dev` operate on the
      # same data. Matches the prod path (/app/data/sqlite.db from prod.env).
      # Parent-dir mount keeps the -wal/-shm WAL sidecars next to sqlite.db.
      - ./data:/app/data
    depends_on:
      - otel-collector
      - minio-init
    networks:
      - syllabus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api
        VITE_ENVIRONMENT: development
    networks:
      - syllabus-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.dev.yaml:/etc/otel-collector-config.yaml
    env_file:
      - config/common.env
      - config/dev.env
      - .secrets.env
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - syllabus-net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - syllabus-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/syllabus-tracker-videos-dev
      "
    networks:
      - syllabus-net

  # ---------------------------------------------------------------------------
  # mock-transcoder (video-cloud profile only)
  #
  # Local dev stand-in for the remote Worker+Queue+Container pipeline.
  # Accepts the same POST /jobs body that CloudflareProcessor sends, then
  # spawns the real video-worker binary against MinIO.
  #
  # Opt-in: only started when the video-cloud profile is active.
  #   docker compose --profile video-cloud up
  #
  # The app service also needs these env vars to route through the mock:
  #   VIDEO_PROCESSOR=cloudflare
  #   VIDEO_ENQUEUE_URL=http://mock-transcoder:8765/jobs
  #   VIDEO_ENQUEUE_TOKEN=dev-token       (any value; mock ignores it)
  #   VIDEO_CALLBACK_SECRET=dev-secret    (must match MOCK_TRANSCODER below)
  #   VIDEO_CALLBACK_BASE_URL=http://app  (in-network app URL; no port, nginx fronts it)
  #
  # Set those in .secrets.env or via `environment:` in a
  # docker-compose.video-cloud.yml override.
  # ---------------------------------------------------------------------------
  mock-transcoder:
    profiles:
      - video-cloud
    build:
      context: .
      dockerfile: crates/video-worker/Dockerfile
    command: ["mock-transcoder"]
    environment:
      # Same MinIO bucket + creds the app service uses.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: auto
      S3_BUCKET: syllabus-tracker-videos-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      # Must match VIDEO_CALLBACK_SECRET set on the app service.
      VIDEO_CALLBACK_SECRET: "${VIDEO_CALLBACK_SECRET:-dev-secret}"
      RUST_LOG: "info"
    ports:
      - "8765:8765"
    depends_on:
      - minio-init
    networks:
      - syllabus-net

networks:
  syllabus-net:

volumes:
  minio-data:
