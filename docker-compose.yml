name: syllabus-tracker-dev
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - config/common.env
      - config/dev.env
      - .secrets.env
    volumes:
      - ./:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/usr/src/app/target
      - /app/target
    depends_on:
      - otel-collector
    networks:
      - syllabus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    env_file:
      - config/common.env
      - config/dev.env
      - .secrets.env
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    networks:
      - syllabus-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.dev.yaml:/etc/otel-collector-config.yaml
    env_file:
      - config/common.env
      - config/dev.env
      - .secrets.env
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - clickstack
    networks:
      - syllabus-net

  clickstack:
    image: clickhouse/clickstack-all-in-one:latest
    ports:
      - "8080:8080" # HyperDX UI
      - "8123:8123" # ClickHouse HTTP
    volumes:
      - clickstack-db:/data/db
      - clickstack-ch-data:/var/lib/clickhouse
      - clickstack-ch-logs:/var/log/clickhouse-server
    networks:
      - syllabus-net

networks:
  syllabus-net:

volumes:
  cargo-cache:
  target-cache:
  sccache-data:
  node-modules:
  clickstack-db:
  clickstack-ch-data:
  clickstack-ch-logs:
