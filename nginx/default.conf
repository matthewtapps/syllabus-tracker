server {
    listen 80;
    server_name _;
    
    # backend
    location /api/ {
        # Headroom for video uploads. The app's VIDEO_MAX_BYTES is the
        # authoritative limit; this just keeps nginx out of the way so
        # oversize bodies get a meaningful error from the app instead of
        # a generic nginx 413.
        client_max_body_size 1G;

        proxy_pass http://app:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
