# OpenTelemetry tracing. The module is loaded via `-g 'load_module ...'`
# in docker compose since `load_module` must sit in nginx's main context.
# Spans are exported via OTLP/gRPC to the local otel-collector, which
# routes by service.name to the nginx-syllabus-tracker Honeycomb dataset.
otel_service_name nginx-syllabus-tracker;
otel_exporter {
    endpoint otel-collector:4317;
}
otel_trace on;
otel_trace_context propagate;

server {
    listen 80;
    server_name _;

    # Use docker's embedded DNS to re-resolve upstreams. Without this,
    # nginx resolves `app` / `frontend` once at config-load and caches
    # the IPs forever; if a deploy recreates `app` (new image SHA) its
    # IP changes and nginx returns 502 until something restarts it.
    # The `set $var ...; proxy_pass $var;` pattern forces nginx to
    # treat the upstream as dynamic, re-resolving on each request.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # backend
    location /api/ {
        # Headroom for video uploads. The app's VIDEO_MAX_BYTES is the
        # authoritative limit; this just keeps nginx out of the way so
        # oversize bodies get a meaningful error from the app instead of
        # a generic nginx 413.
        client_max_body_size 1G;

        set $app_upstream "http://app:8000";
        proxy_pass $app_upstream;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # frontend
    location / {
        set $frontend_upstream "http://frontend:80";
        proxy_pass $frontend_upstream;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# stub_status for the otel-collector's nginx receiver. Bound to the
# container's network interface; not exposed to the host.
server {
    listen 8081;
    server_name _;

    location /status {
        stub_status on;
        access_log off;
        otel_trace off;
    }

    location / {
        return 404;
    }
}
