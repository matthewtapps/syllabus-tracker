name: syllabus-tracker-services

services:
  nginx:
    image: nginx:1.31-alpine-otel
    restart: unless-stopped
    # `load_module` must live in nginx's main context; -g injects it
    # before the bundled nginx.conf is parsed.
    command:
      [
        "nginx",
        "-g",
        "load_module modules/ngx_otel_module.so; daemon off;",
      ]
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - internal
      - host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://app:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  app:
    image: ${REGISTRY}/${IMAGE_NAME}/app:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./config/common.env
      - ./config/prod.env
      - /run/secrets/syllabus-tracker.env
    environment:
      - ALLOW_DESTRUCTIVE_MIGRATIONS=${ALLOW_DESTRUCTIVE_MIGRATIONS:-false}
    volumes:
      - app-data:/app/data
    networks:
      - internal
    expose:
      - "8000"

  frontend:
    image: ${REGISTRY}/${IMAGE_NAME}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "80"
    env_file:
      - config/common.env
      - config/prod.env
      - /run/secrets/syllabus-tracker.env
    depends_on:
      app:
        condition: service_started

  litestream:
    image: litestream/litestream:0.3.13
    container_name: syllabus-tracker-litestream
    restart: unless-stopped
    command: ["replicate", "-config", "/etc/litestream.yml"]
    volumes:
      - app-data:/data:rw
      - ./config/litestream.yml:/etc/litestream.yml:ro
    env_file:
      - ./config/common.env
      - ./config/prod.env
      - /run/secrets/syllabus-tracker.env
    depends_on:
      app:
        condition: service_started
    networks:
      - internal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    group_add:
      - "131"
    # OTLP/gRPC published on loopback so the NixOS host nginx (running
    # outside docker) can ship its spans to the same collector that
    # handles app + docker-nginx telemetry.
    ports:
      - "127.0.0.1:4317:4317"
    # Lets the nginx receiver scrape host nginx stub_status via the
    # bridge gateway. See nixos/configuration.nix for the matching
    # firewall + allow rules.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/otel-collector-config.prod.yaml:/etc/otel-collector-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./config/common.env
      - ./config/prod.env
      - /run/secrets/syllabus-tracker.env
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_started
      nginx:
        condition: service_healthy

volumes:
  app-data:

networks:
  internal:
  host:
    driver: bridge
