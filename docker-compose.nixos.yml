name: sillybus

services:
  nginx:
    image: nginx:1.31-alpine-otel
    restart: unless-stopped
    # `load_module` must live in nginx's main context; -g injects it
    # before the bundled nginx.conf is parsed.
    command:
      [
        "nginx",
        "-g",
        "load_module modules/ngx_otel_module.so; daemon off;",
      ]
    # Bound on the per-service port the host's Traefik routes to. Stack
    # is portable — anywhere with this port free, the stack runs the
    # same way; nothing about the compose file is Traefik-specific.
    # NGINX_HOST_PORT parameterized so sibling instances of this stack
    # (via bootstrap-sibling.yaml) can coexist on different host ports
    # while Traefik routes by Host header.
    ports:
      - "127.0.0.1:${NGINX_HOST_PORT:-8001}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - internal
      - host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://app:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # One-shot init container: restore /data/sqlite.db from $LITESTREAM_BUCKET
  # if the local volume is empty. Exits successfully whether a replica was
  # found (restored) or not (empty bucket -> fresh deployment, app creates
  # schema). app + litestream depend on this completing.
  #
  # This is the canonical "restore on start" mechanism. It runs on:
  # - First deployment in a fresh volume (empty bucket: no-op; existing
  #   bucket: restore from R2).
  # - Cattle rebuild of the host (fresh volume, bucket has data: restore).
  # - Spinning up a sibling stack pointed at a different bucket (set
  #   LITESTREAM_BUCKET to the source service's bucket via runtime secrets;
  #   for true forks, R2-to-R2 copy the source bucket into the sibling's
  #   own bucket first).
  litestream-restore:
    image: litestream/litestream:0.3.13
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f /data/sqlite.db ]; then
          echo "[litestream-restore] /data/sqlite.db already present; skipping"
          exit 0
        fi
        echo "[litestream-restore] no local DB; attempting restore from $${LITESTREAM_BUCKET}"
        if litestream restore -config /etc/litestream.yml /data/sqlite.db; then
          echo "[litestream-restore] restored from R2 ($$( du -h /data/sqlite.db | cut -f1 ))"
        else
          echo "[litestream-restore] no replica found in bucket; creating empty DB so app can initialize schema"
          : > /data/sqlite.db
          chmod 0660 /data/sqlite.db
        fi
    volumes:
      - app-data:/data:rw
      - ./config/litestream.yml:/etc/litestream.yml:ro
    env_file:
      - ./config/common.env
      - ./config/prod.env
      - /run/runtime-secrets/sillybus.env
    networks:
      - internal

  app:
    image: ${REGISTRY}/${IMAGE_NAME}/app:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./config/common.env
      - ./config/prod.env
      - /run/runtime-secrets/sillybus.env
      # Honeycomb ingest keys, written by the deploy workflow's
      # 'Build sillybus-honeycomb.enc.env' step. Split so rotation
      # is one tofu apply, no commit.
      - /run/runtime-secrets/sillybus-honeycomb.env
    environment:
      - ALLOW_DESTRUCTIVE_MIGRATIONS=${ALLOW_DESTRUCTIVE_MIGRATIONS:-false}
    volumes:
      - app-data:/app/data
    networks:
      - internal
    expose:
      - "8000"
    # Wait for litestream-restore to have populated (or no-op'd) the volume
    # before booting; otherwise app would create a fresh schema and clobber
    # the restored DB on first write.
    depends_on:
      litestream-restore:
        condition: service_completed_successfully

  frontend:
    image: ${REGISTRY}/${IMAGE_NAME}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "80"
    env_file:
      - config/common.env
      - config/prod.env
      - /run/runtime-secrets/sillybus.env
      - /run/runtime-secrets/sillybus-honeycomb.env
    depends_on:
      app:
        condition: service_started

  litestream:
    image: litestream/litestream:0.3.13
    container_name: syllabus-tracker-litestream
    restart: unless-stopped
    command: ["replicate", "-config", "/etc/litestream.yml"]
    volumes:
      - app-data:/data:rw
      - ./config/litestream.yml:/etc/litestream.yml:ro
    env_file:
      - ./config/common.env
      - ./config/prod.env
      - /run/runtime-secrets/sillybus.env
      # Honeycomb ingest keys, written by the deploy workflow's
      # 'Build sillybus-honeycomb.enc.env' step. Split so rotation
      # is one tofu apply, no commit.
      - /run/runtime-secrets/sillybus-honeycomb.env
    # Wait for litestream-restore to finish so we don't race against the
    # restore on a cattle rebuild. app starts on the same gate.
    depends_on:
      litestream-restore:
        condition: service_completed_successfully
    networks:
      - internal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    group_add:
      - "131"
    # OTLP/gRPC published on loopback so the NixOS host nginx (running
    # outside docker) can ship its spans to the same collector that
    # handles app + docker-nginx telemetry. Parameterized for sibling
    # coexistence (bootstrap-sibling.yaml uses a different port).
    ports:
      - "127.0.0.1:${OTEL_COLLECTOR_HOST_PORT:-4317}:4317"
    # Lets the nginx receiver scrape host nginx stub_status via the
    # bridge gateway. See nixos/configuration.nix for the matching
    # firewall + allow rules.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/otel-collector-config.prod.yaml:/etc/otel-collector-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./config/common.env
      - ./config/prod.env
      - /run/runtime-secrets/sillybus.env
      # Honeycomb ingest keys, written by the deploy workflow's
      # 'Build sillybus-honeycomb.enc.env' step. Split so rotation
      # is one tofu apply, no commit.
      - /run/runtime-secrets/sillybus-honeycomb.env
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_started
      nginx:
        condition: service_healthy

volumes:
  app-data:

networks:
  internal:
  host:
    driver: bridge
