receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://localhost:5173
            - http://localhost:8000

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - action: insert
        key: service.instance.id
        value: "${HOSTNAME}"
      - action: insert
        key: deployment.environment
        value: "${OTEL_ENVIRONMENT}"

exporters:
  otlphttp/clickstack:
    endpoint: "http://clickstack:4318"
    headers:
      authorization: "${CLICKSTACK_INGESTION_API_KEY}"
  # otlp_grpc/traces:
  #   endpoint: "api.honeycomb.io:443"
  #   headers:
  #     "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
  #     "x-honeycomb-dataset": "syllabus-tracker"
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/clickstack]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/clickstack]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/clickstack]
