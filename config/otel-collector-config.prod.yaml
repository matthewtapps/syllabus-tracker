receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 60s
  host_metrics:
    collection_interval: 60s
    scrapers:
      cpu:
      memory:
      load:
      disk:
  # Scrapes stub_status on the docker nginx (see nginx/default.conf, the
  # :8081/status server block). Reachable on the internal compose network.
  nginx/app:
    endpoint: "http://nginx:8081/status"
    collection_interval: 30s
  # Scrapes stub_status on the NixOS host nginx via the docker bridge
  # gateway. The host firewall + nginx-level allow rules keep this
  # endpoint private to docker bridges.
  nginx/host:
    endpoint: "http://host.docker.internal:8082/status"
    collection_interval: 30s

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - action: insert
        key: service.instance.id
        value: "${HOSTNAME}"
      - action: insert
        key: deployment.environment
        value: "${OTEL_ENVIRONMENT}"
  # The nginx receiver emits resourceless metrics; stamp service.name so
  # Honeycomb routes them to the right dataset (it auto-routes metrics
  # without an explicit dataset header by service.name).
  resource/nginx-app:
    attributes:
      - action: insert
        key: service.name
        value: nginx-syllabus-tracker
  resource/nginx-host:
    attributes:
      - action: insert
        key: service.name
        value: nginx-do-host
  tail_sampling:
    decision_wait: 10s
    num_traces: 1
    policies:
      [
        {
          name: health-check-low-sampling,
          type: and,
          and:
            {
              and_sub_policy:
                [
                  {
                    name: health-check-endpoint-policy,
                    type: string_attribute,
                    string_attribute:
                      {
                        key: uri,
                        values: [.*\/health.*],
                        enabled_regex_matching: true,
                      },
                  },
                  {
                    name: sample-health-checks,
                    type: probabilistic,
                    probabilistic: { sampling_percentage: 2 },
                  },
                ],
            },
        },
        {
          name: fully-sample-default,
          type: and,
          and:
            {
              and_sub_policy:
                [
                  {
                    name: not-health-check-endpoint,
                    type: string_attribute,
                    string_attribute:
                      {
                        key: uri,
                        values: [.*\/health.*],
                        enabled_regex_matching: true,
                        invert_match: true,
                      },
                  },
                  { name: always-sample, type: always_sample },
                ],
            },
        },
      ]

exporters:
  # No x-honeycomb-dataset header: in a Honeycomb Environment, traces
  # land in the dataset named after service.name. So:
  #   service.name = syllabus-tracker        -> syllabus-tracker dataset
  #   service.name = nginx-syllabus-tracker  -> nginx-syllabus-tracker dataset
  #   service.name = nginx-do-host           -> nginx-do-host dataset
  otlp_http/traces:
    endpoint: "https://api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
  # Metrics still need explicit dataset routing because the app's metrics
  # don't share a service.name with the metrics dataset name. Nginx
  # metrics use service.name routing (no header) so they land alongside
  # their traces.
  otlp_http/metrics:
    endpoint: "https://api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
      "x-honeycomb-dataset": "syllabus-tracker-metrics"
  otlp_http/metrics-nginx:
    endpoint: "https://api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource, tail_sampling]
      exporters: [otlp_http/traces]
    metrics:
      receivers: [docker_stats, host_metrics, otlp]
      processors: [batch, resource]
      exporters: [otlp_http/metrics]
    metrics/nginx-app:
      receivers: [nginx/app]
      processors: [batch, resource, resource/nginx-app]
      exporters: [otlp_http/metrics-nginx]
    metrics/nginx-host:
      receivers: [nginx/host]
      processors: [batch, resource, resource/nginx-host]
      exporters: [otlp_http/metrics-nginx]

  telemetry:
    metrics:
      level: none
